# Global defaults inherited by all training jobs
system:
  environment: dev
  log_level: INFO
mlflow:
  tracking_uri: mlruns        # NOT http://localhost:5000
  experiment_name: dynamic_pricing_models
paths:
  output_dir: data/output
  logs_dir: logs
ray:
  address: null
  num_cpus: 4
  num_gpus: 0
delta_lake:
  golden_dataset_path: "D:/delta_tables/golden_pricing_table"
  expected_columns:
    - price
    - competitor_price
    - inventory_level
    - price_diff_pct
    - demand_qty
